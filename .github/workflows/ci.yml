name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"   # nightly for Layer 6 corruption tests

jobs:
  lint:
    name: Lint & type-check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install dev + gui dependencies
        run: uv venv && source .venv/bin/activate && uv pip install -e ".[dev,gui]"
      - name: Ruff lint
        run: source .venv/bin/activate && ruff check src/ tests/
      - name: Black format check
        run: source .venv/bin/activate && black --check src/ tests/
      - name: Mypy type-check
        run: source .venv/bin/activate && mypy src/imessage_archiver/ --ignore-missing-imports

  reject-destructive-sql:
    name: Reject destructive SQL on chat.db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Grep for destructive SQL targeting source DB
        run: |
          ! grep -rEi \
            "(INSERT|UPDATE|DELETE|DROP|ALTER|REPLACE|TRUNCATE|VACUUM)[[:space:]]+(INTO[[:space:]]+|FROM[[:space:]]+|TABLE[[:space:]]+)?['\"]?chat\.(db|sqlite)" \
            src/

  test:
    name: Tests (Layers 1–4)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install dev + gui dependencies
        run: uv venv && source .venv/bin/activate && uv pip install -e ".[dev,gui]"
      - name: Generate fixtures
        run: source .venv/bin/activate && python tests/fixtures/generate.py
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          source .venv/bin/activate
          pytest tests/unit/ tests/integration/ \
            -v --cov=imessage_archiver --cov-report=term-missing \
            --cov-report=html --cov-fail-under=80
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/

  corruption-tests:
    name: Corruption resistance (Layer 6, nightly only)
    runs-on: macos-14
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install dev + gui dependencies
        run: uv venv && source .venv/bin/activate && uv pip install -e ".[dev,gui]"
      - name: Generate fixtures
        run: source .venv/bin/activate && python tests/fixtures/generate.py
      - name: Run corruption tests
        # PR #13 created tests/integration/test_corruption_resistance.py — the
        # old workflow pointed at a never-created tests/unit/test_corruption.py.
        run: source .venv/bin/activate && pytest tests/integration/test_corruption_resistance.py -v
