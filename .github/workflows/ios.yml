name: iOS Build & Test

on:
  push:
    branches: [main]
    # Fire on Python AND iOS changes — fixture is generated by the Python
    # archiver, so a writer change can break iOS tests too.
    paths:
      - "ios/**"
      - "src/**"
      - "tests/fixtures/**"
      - "pyproject.toml"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - "src/**"
      - "tests/fixtures/**"
      - "pyproject.toml"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Python 3.12 (for fixture generation)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies for fixture
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv venv && source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Generate Python test fixtures
        run: source .venv/bin/activate && python tests/fixtures/generate.py

      - name: Generate tiny.imarchive bundle for iOS tests
        run: |
          source .venv/bin/activate
          ./ios/Tests/Fixtures/generate_fixture.sh

      - name: Fixture must exist (fail loud, not silently skip)
        run: |
          if [ ! -d "ios/Tests/Fixtures/tiny.imarchive" ]; then
            echo "ERROR: ios/Tests/Fixtures/tiny.imarchive was not generated."
            echo "iOS tests would XCTSkip silently without it — failing CI loudly instead."
            exit 1
          fi
          ls -la ios/Tests/Fixtures/tiny.imarchive/

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Regenerate Xcode project (restores entitlements)
        run: ./ios/regenerate.sh

      - name: Resolve SPM packages
        working-directory: ios
        run: xcodebuild -project iMessageArchiver.xcodeproj -resolvePackageDependencies

      - name: Pick a simulator destination
        id: pick-sim
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d['name']:
                      print(f\"platform=iOS Simulator,id={d['udid']}\")
                      sys.exit(0)
          print('platform=iOS Simulator,name=iPhone 16,OS=latest')
          ")
          echo "Using destination: $DEST"
          echo "destination=$DEST" >> $GITHUB_OUTPUT

      - name: Build (simulator, no signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project iMessageArchiver.xcodeproj \
            -scheme iMessageArchiver \
            -destination "${{ steps.pick-sim.outputs.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test (simulator, no signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project iMessageArchiver.xcodeproj \
            -scheme iMessageArchiver \
            -destination "${{ steps.pick-sim.outputs.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test
