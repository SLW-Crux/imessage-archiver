name: iMessageArchiver
options:
  bundleIdPrefix: com.slw
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "7V698GFQCM"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.4.0"
    CURRENT_PROJECT_VERSION: "1"
    # Xcode-recommended hygiene (mirrored here so xcodegen doesn't
    # overwrite the .pbxproj edits on regen). Equivalent to clicking
    # "Perform Changes" in Xcode's project-modernization dialog.
    DEAD_CODE_STRIPPING: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    LOCALIZED_STRING_SWIFTUI_SUPPORT: "YES"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  iMessageArchiver:
    type: application
    platform: iOS
    bundleId: com.slw.imessage-archiver
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          # Excludes the Mac-specific @main entry from the iOS app target.
          - "App/iMessageArchiverMacApp.swift"
      # xcodegen 2.45.4 silently drops top-level `resources:` blocks on
      # this project — no PBXResourcesBuildPhase gets emitted, so the
      # asset catalog never lands in the .app bundle. Declaring the
      # resource directory under `sources:` with explicit
      # `buildPhase: resources` forces the right phase to exist.
      - path: Resources
        buildPhase: resources
    entitlements:
      path: iMessageArchiver.entitlements
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: iMessage Archive
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        NSUbiquitousContainers:
          iCloud.com.slw.imessage-archiver:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: iMessage Archiver
            NSUbiquitousContainerSupportedFolderLevels: Any
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_NAME: iMessageArchiver
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GRDB
    capabilities:
      iCloud:
        cloudKit: false
        iCloudDocuments: true
        customContainers:
          - iCloud.com.slw.imessage-archiver

  iMessageArchiverMac:
    type: application
    platform: macOS
    bundleId: com.slw.imessage-archiver-mac
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          # Excludes the iOS-specific @main entry from the Mac app target.
          - "App/iMessageArchiverApp.swift"
      - path: Resources
        buildPhase: resources
    entitlements:
      path: iMessageArchiverMac.entitlements
    info:
      path: InfoMac.plist
      properties:
        CFBundleDisplayName: iMessage Archive
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSUbiquitousContainers:
          iCloud.com.slw.imessage-archiver:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: iMessage Archiver
            NSUbiquitousContainerSupportedFolderLevels: Any
    settings:
      base:
        PRODUCT_NAME: iMessageArchiverMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Hardened Runtime is required for macOS apps that use iCloud.
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
    capabilities:
      iCloud:
        cloudKit: false
        iCloudDocuments: true
        customContainers:
          - iCloud.com.slw.imessage-archiver

  iMessageArchiverTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.slw.imessage-archiver.tests
    sources:
      - path: Tests
        excludes:
          # The whole Fixtures directory is non-source: generate_fixture.sh
          # is a shell helper, tiny.imarchive is a resource bundle that
          # we re-add as a resource below.
          - "Fixtures"
      # Add the .imarchive bundle directly (not its parent) so it lands
      # at the test bundle's root, where Bundle.url(forResource:
      # withExtension:) looks. `type: folder` makes Xcode treat the
      # directory as a blue folder reference (copied verbatim into the
      # bundle). Declared under sources: with explicit
      # buildPhase: resources — xcodegen 2.45.4 silently drops the
      # equivalent top-level resources: block on this project.
      - path: Tests/Fixtures/tiny.imarchive
        type: folder
        buildPhase: resources
    dependencies:
      - target: iMessageArchiver
      - package: GRDB
    settings:
      base:
        DEVELOPMENT_TEAM: "7V698GFQCM"
        CODE_SIGN_STYLE: Automatic
