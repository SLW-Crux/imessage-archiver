name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-14  # Apple Silicon (arm64)
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[gui,build]"
          uv pip install --system "pyinstaller>=6.0"

      - name: Build .app
        run: ./packaging/build_macos_arm64.sh

      - name: Verify arm64
        run: |
          APP="dist/iMessage Archiver.app"
          BIN="$APP/Contents/MacOS/iMessage Archiver"
          lipo -archs "$BIN"
          lipo -archs "$BIN" | grep -q arm64 || (echo "arm64 not present"; exit 1)

      - name: Package DMG (optional)
        run: |
          APP="dist/iMessage Archiver.app"
          VERSION="${GITHUB_REF_NAME:-dev}"
          DMG="dist/iMessageArchiver-${VERSION}-arm64.dmg"
          hdiutil create \
            -volname "iMessage Archiver" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG" || echo "DMG creation skipped (hdiutil issue)"
          ls -lh dist/

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: iMessageArchiver-app-${{ github.ref_name }}
          path: "dist/iMessage Archiver.app"
          retention-days: 30

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: iMessageArchiver-dmg-${{ github.ref_name }}
          path: dist/*.dmg
          retention-days: 30
          if-no-files-found: warn
